name = "newtrospect-worker"
main = "src/index.ts"
compatibility_date = "2026-05-19"
compatibility_flags = ["nodejs_compat"]

# Workers AI
[ai]
binding = "AI"

# D1: 본문 SHA-256 해시 기반 캐시 (Phase 1: 캐시 전용, UID 없음)
# 생성 후 database_id 를 채워 넣을 것:
#   npx wrangler d1 create newtrospect
[[d1_databases]]
binding = "DB"
database_name = "newtrospect"
database_id = "1e3ae7d6-9683-4664-a226-ff183f0264a1"
migrations_dir = "migrations"

# endpoint 별 provider 매핑.
# S2 spike(2026-05-21) 에서 llama-3.1-8b 가 fixture 에선 잘 했지만
# 실제 한국 뉴스(연합 정치 기사) 에선 sensational/context 0건, quantitative
# 24개 환각으로 한계 확인 → 이 3개를 Gemini 로 전환.
# term 은 실측에서도 의미 있는 용어 잘 잡아 workers-ai 유지 (비용 절감).
# detect 는 짧은 슬라이스만 보고 호출량 많아 workers-ai 유지.
[vars]
PROVIDER_TERM = "gemini"
PROVIDER_SENSATIONAL = "gemini"
PROVIDER_QUANTITATIVE = "gemini"
PROVIDER_CONTEXT = "gemini"
PROVIDER_DETECT = "gemini"
PROVIDER_BRIEFING = "gemini"
PROVIDER_ONELINE = "gemini"
PROVIDER_CHARACTER = "gemini"
PROVIDER_REWRITE = "gemini"

# 모델 차등 (2026-05-26):
#   추론 부담 큰 곳 (외부 지식·맥락·프레이밍 판별·배경 카드) → Gemini 3.1 Pro
#     term / sensational / context / briefing
#   가벼운 추출·분류·1문장 작성 → flash-latest
#     quantitative / character / oneline / rewrite
#   호출량 많고 빠른 판정만 필요 → flash-lite
#     detect
MODEL_TERM = "gemini-3.1-pro-preview"
MODEL_SENSATIONAL = "gemini-3.1-pro-preview"
MODEL_CONTEXT = "gemini-3.1-pro-preview"
MODEL_BRIEFING = "gemini-3.1-pro-preview"
MODEL_QUANTITATIVE = "gemini-flash-latest"
MODEL_CHARACTER = "gemini-flash-latest"
MODEL_ONELINE = "gemini-flash-latest"
MODEL_REWRITE = "gemini-flash-latest"
MODEL_DETECT = "gemini-flash-lite-latest"

# 캐시 TTL (초). 1시간.
CACHE_TTL_SEC = "3600"
