name = "newtrospect-worker"
main = "src/index.ts"
compatibility_date = "2026-05-19"
compatibility_flags = ["nodejs_compat"]

# Workers AI
[ai]
binding = "AI"

# D1: 본문 SHA-256 해시 기반 캐시 (Phase 1: 캐시 전용, UID 없음)
# 생성 후 database_id 를 채워 넣을 것:
#   npx wrangler d1 create newtrospect
[[d1_databases]]
binding = "DB"
database_name = "newtrospect"
database_id = "1e3ae7d6-9683-4664-a226-ff183f0264a1"
migrations_dir = "migrations"

# endpoint 별 provider 매핑. S2 spike 후 갱신.
[vars]
PROVIDER_TERM = "workers-ai"
PROVIDER_SENSATIONAL = "workers-ai"
PROVIDER_QUANTITATIVE = "workers-ai"
PROVIDER_CONTEXT = "workers-ai"
PROVIDER_DETECT = "workers-ai"

# 모델 선택 — S2 spike(2026-05-21) 결과 llama-3.1-8b 채택.
# 4개 분석 모두 term 98% / sensational 93% / quantitative 80% / p95 3s.
# 비교 대상(전부 탈락): llama-3.3-70b-fp8-fast(term 40%), gpt-oss-120b(p95 19s),
# deepseek-r1-distill-qwen-32b(p95 27s), llama-3.2-3b(term 16%).
# qwen1.5-14b-chat-awq, gemma-2-9b-it 는 Cloudflare 측 deprecation/미호스팅 으로 호출 불가.
MODEL_TERM = "@cf/meta/llama-3.1-8b-instruct"
MODEL_SENSATIONAL = "@cf/meta/llama-3.1-8b-instruct"
MODEL_QUANTITATIVE = "@cf/meta/llama-3.1-8b-instruct"
MODEL_CONTEXT = "@cf/meta/llama-3.1-8b-instruct"
# detect 는 짧은 본문 슬라이스만 받으니 8b 로 충분. 추후 더 작은 모델로 교체 검토 가능.
MODEL_DETECT = "@cf/meta/llama-3.1-8b-instruct"

# 캐시 TTL (초). 1시간.
CACHE_TTL_SEC = "3600"
