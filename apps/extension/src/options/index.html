<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>newtrospect — 설정</title>
    <style>
      :root { color-scheme: light dark; font-family: system-ui, -apple-system, "Pretendard", sans-serif; }
      body { max-width: 520px; margin: 32px auto; padding: 0 16px; line-height: 1.5; }
      h1 { font-size: 20px; margin-bottom: 4px; }
      h1 small { font-weight: normal; opacity: 0.6; font-size: 13px; }
      fieldset { border: 1px solid color-mix(in srgb, currentColor 18%, transparent); border-radius: 6px; padding: 12px 16px; margin: 16px 0; }
      legend { padding: 0 6px; font-weight: 600; font-size: 13px; }
      label { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
      input[type="text"] { width: 100%; padding: 6px 8px; box-sizing: border-box; }
      .swatch { display: inline-block; width: 12px; height: 12px; border-radius: 2px; }
      .term { background: rgba(90, 150, 255, 0.5); }
      .sensational { background: rgba(255, 90, 90, 0.5); }
      .quantitative { background: rgba(80, 200, 120, 0.5); }
      .context { background: rgba(255, 220, 90, 0.7); }
      .status { font-size: 12px; opacity: 0.7; margin-top: 8px; }
    </style>
  </head>
  <body>
    <h1>newtrospect <small>설정</small></h1>

    <fieldset>
      <legend>API</legend>
      <label>서버 베이스 URL <input id="apiBaseUrl" type="text" /></label>
    </fieldset>

    <fieldset>
      <legend>자동 감지</legend>
      <label><input id="autoDetect" type="checkbox" /> 페이지 로드 시 자동으로 분석</label>
    </fieldset>

    <fieldset>
      <legend>표시할 분석 색</legend>
      <label><input data-kind="term" type="checkbox" /><span class="swatch term"></span> 파랑 — 어려운 용어</label>
      <label><input data-kind="sensational" type="checkbox" /><span class="swatch sensational"></span> 빨강 — 자극적 표현</label>
      <label><input data-kind="quantitative" type="checkbox" /><span class="swatch quantitative"></span> 초록 — 수치·검색</label>
      <label><input data-kind="context" type="checkbox" /><span class="swatch context"></span> 노랑 — 핵심 문맥</label>
    </fieldset>

    <div class="status" id="status"></div>

    <script type="module" src="./index.ts"></script>
  </body>
</html>
